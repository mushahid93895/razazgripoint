<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Horticulture MJPRU Mock Test - Razaagripoint</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary: #2e7d32;
            --primary-light: #66bb6a;
            --dark: #1b5e20;
            --accent: #ffca28;
            --bg: #f1f8e9;
            --white: #ffffff;
            --text: #2c3e50;
            --shadow: 0 10px 30px rgba(46, 125, 50, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; }

        /* --- Navbar --- */
        nav { background: var(--white); padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 15px rgba(0,0,0,0.04); }
        .logo { color: var(--primary); font-size: 24px; font-weight: 800; text-decoration: none; display: flex; align-items: center; gap: 10px; }
        .exit-btn { background: #fff3e0; color: #e65100; text-decoration: none; padding: 8px 20px; border-radius: 20px; font-weight: 600; font-size: 14px; transition: 0.3s; border: 1px solid #ffe0b2; }
        .exit-btn:hover { background: #e65100; color: var(--white); }

        /* --- Main Layout Container --- */
        .container { flex-grow: 1; display: flex; align-items: center; justify-content: center; padding: 30px 20px; }
        .quiz-card { background: var(--white); width: 100%; max-width: 800px; border-radius: 24px; box-shadow: var(--shadow); padding: 40px; position: relative; overflow: hidden; border: 1px solid rgba(0,0,0,0.03); }

        /* --- 1. Language Screen --- */
        .lang-screen { text-align: center; }
        .lang-screen i.main-icon { font-size: 60px; color: var(--primary-light); margin-bottom: 20px; animation: float 3s ease-in-out infinite; }
        .lang-screen h1 { font-size: 32px; color: var(--dark); font-weight: 800; margin-bottom: 10px; }
        .lang-screen p { color: #666; margin-bottom: 40px; font-size: 16px; }
        .lang-btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; max-width: 500px; margin: 0 auto; }
        .lang-btn { background: var(--white); border: 2px solid #e0e0e0; border-radius: 16px; padding: 25px 20px; font-size: 18px; font-weight: 700; color: var(--dark); cursor: pointer; transition: all 0.3s ease; display: flex; flex-direction: column; align-items: center; gap: 10px; }
        .lang-btn:hover { border-color: var(--primary-light); background: #f1f8e9; transform: translateY(-5px); box-shadow: 0 10px 20px rgba(46,125,50,0.1); }
        .lang-btn span { font-size: 13px; color: #777; font-weight: 400; }

        /* --- 2. Quiz Screen --- */
        .quiz-screen { display: none; }
        .quiz-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; border-bottom: 2px solid #f0f0f0; padding-bottom: 15px; }
        .q-count { font-weight: 700; color: var(--primary); background: #e8f5e9; padding: 4px 15px; border-radius: 15px; font-size: 14px; }
        
        .progress-container { width: 100%; background: #eee; height: 8px; border-radius: 4px; margin-bottom: 30px; overflow: hidden; }
        .progress-bar { height: 100%; background: linear-gradient(90deg, var(--primary-light), var(--primary)); width: 0%; transition: width 0.3s ease; }

        .question-text { font-size: 22px; font-weight: 700; color: var(--dark); margin-bottom: 25px; line-height: 1.4; }
        
        .options-grid { display: flex; flex-direction: column; gap: 15px; margin-bottom: 30px; }
        .option { background: #fdfdfd; border: 2px solid #f0f0f0; border-radius: 14px; padding: 18px 25px; font-size: 16px; font-weight: 500; text-align: left; cursor: pointer; transition: all 0.2s ease; display: flex; align-items: center; justify-content: space-between; }
        .option:hover { background: #f1f8e9; border-color: #c8e6c9; }
        .option.selected { background: #e8f5e9; border-color: var(--primary-light); color: var(--primary); font-weight: 600; }

        .quiz-footer { display: flex; justify-content: space-between; align-items: center; }
        .nav-btn { background: var(--primary); color: var(--white); border: none; padding: 14px 35px; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; transition: 0.3s; display: flex; align-items: center; gap: 10px; }
        .nav-btn:hover { background: var(--dark); transform: translateY(-2px); }
        .nav-btn:disabled { background: #ccc; cursor: not-allowed; transform: none; }

        /* --- 3. Result Screen --- */
        .result-screen { display: none; text-align: center; }
        .result-screen .congrats-icon { font-size: 70px; color: var(--accent); margin-bottom: 20px; animation: bounce 2s infinite; }
        .result-screen h2 { font-size: 36px; font-weight: 800; color: var(--dark); margin-bottom: 15px; }
        .message-box { font-size: 18px; color: #555; max-width: 600px; margin: 0 auto 30px auto; line-height: 1.6; font-weight: 500; }
        
        .score-circle { width: 160px; height: 160px; border-radius: 50%; background: linear-gradient(135deg, var(--primary-light), var(--primary)); color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; margin: 0 auto 40px auto; box-shadow: 0 10px 25px rgba(46,125,50,0.3); }
        .score-circle h1 { font-size: 46px; font-weight: 800; line-height: 1; }
        .score-circle span { font-size: 14px; opacity: 0.8; font-weight: 500; text-transform: uppercase; margin-top: 5px; }

        .restart-btn { background: var(--accent); color: var(--dark); border: none; padding: 15px 40px; border-radius: 30px; font-size: 16px; font-weight: 700; cursor: pointer; transition: 0.3s; box-shadow: 0 5px 15px rgba(255,202,40,0.4); }
        .restart-btn:hover { background: #ffb300; transform: scale(1.05); }

        /* --- Animations --- */
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        @keyframes bounce { 0%, 20%, 50%, 80%, 100% { transform: translateY(0); } 40% { transform: translateY(-20px); } 60% { transform: translateY(-10px); } }

        footer { text-align: center; padding: 25px; margin-top: auto; border-top: 1px solid #eee; background: #fff; }
    </style>
</head>
<body>

    <nav>
        <a href="index.html" class="logo"><i class="fa-solid fa-seedling"></i> Razaagripoint</a>
        <a href="semester2.html" class="exit-btn"><i class="fa-solid fa-xmark"></i> Exit Test</a>
    </nav>

    <div class="container">
        <div class="quiz-card">
            
            <div id="langScreen" class="lang-screen">
                <i class="fa-solid fa-sun main-icon"></i>
                <h1>Horticulture Mock Test</h1>
                <p>MJPRU Syllabus Pattern • 50 Questions • 50 Marks</p>
                
                <div class="lang-btn-grid">
                    <button class="lang-btn" onclick="startQuiz('hi')">
                        हिन्दी टेस्ट
                        <span>कृषि बागवानी - हिंदी माध्यम</span>
                    </button>
                    <button class="lang-btn" onclick="startQuiz('en')">
                        English Test
                        <span>Horticulture - English Medium</span>
                    </button>
                </div>
            </div>

            <div id="quizScreen" class="quiz-screen">
                <div class="quiz-header">
                    <span id="questionCount" class="q-count">Question 1 of 50</span>
                </div>
                
                <div class="progress-container">
                    <div id="progressBar" class="progress-bar"></div>
                </div>

                <div id="questionText" class="question-text">Loading Question...</div>
                
                <div id="optionsGrid" class="options-grid"></div>

                <div class="quiz-footer">
                    <button id="prevBtn" class="nav-btn" onclick="prevQuestion()" disabled><i class="fa-solid fa-arrow-left"></i> Previous</button>
                    <button id="nextBtn" class="nav-btn" onclick="nextQuestion()">Next <i class="fa-solid fa-arrow-right"></i></button>
                </div>
            </div>

            <div id="resultScreen" class="result-screen">
                <div id="congratsIcon" class="congrats-icon"><i class="fa-solid fa-award"></i></div>
                <h2 id="resultHeading">Great Job!</h2>
                <div id="messageBox" class="message-box">Results loading...</div>
                
                <div class="score-circle">
                    <h1 id="scoreDisplay">00</h1>
                    <span>Out of 50</span>
                </div>

                <button class="restart-btn" onclick="restartQuiz()"><i class="fa-solid fa-rotate-right"></i> Retake Test</button>
            </div>

        </div>
    </div>

    <footer>
        <p style="font-size: 14px; color: #888;">Designed by <b>MUSHAHID RAZA</b> with ❤️ for BSc Agriculture Students</p>
    </footer>

    <script>
        // Clean MJPRU-Based Core Questions Data Bank
        const quizData = {
            en: [
                { q: "The term 'Horticulture' is derived from which language?", o: ["Greek", "Latin", "French", "Arabic"], a: 1 },
                { q: "Who is known as the Father of Modern Horticulture in India?", o: ["M.S. Swaminathan", "M.H. Marigowda", "L.H. Bailey", "K.L. Chadha"], a: 1 },
                { q: "Which of the following is a temperate fruit commonly asked in MJPRU exams?", o: ["Mango", "Apple", "Banana", "Guava"], a: 1 },
                { q: "Olericulture refers to the scientific study of:", o: ["Fruit crops", "Vegetable crops", "Flower crops", "Spices Management"], a: 1 },
                { q: "Asexual propagation through 'T-Budding' is most commonly practiced in:", o: ["Rose", "Mango", "Papaya", "Banana"], a: 0 },
                { q: "Which fruit is classically known as the 'King of Fruits' in India?", o: ["Apple", "Mango", "Grape", "Pineapple"], a: 1 },
                { q: "Pruning is a mandatory cultivation practice in which crop for optimal production?", o: ["Grape", "Banana", "Papaya", "Coconut"], a: 0 },
                { q: "Which of the following fruit crops is a rich source of Vitamin C?", o: ["Mango", "Barbados Cherry", "Apple", "Banana"], a: 1 },
                { q: "The botanical edible part of Pomegranate is termed as:", o: ["Thalamus", "Aril", "Mesocarp", "Endosperm"], a: 1 },
                { q: "Training of horticultural plants is primarily done to:", o: ["Increase yield", "Give a proper framework and shape", "Kill target pests", "Improve fruit color"], a: 1 },
                { q: "National Horticulture Board (NHB) headquarters is located at:", o: ["New Delhi", "Gurugram", "Lucknow", "Bengaluru"], a: 1 },
                { q: "The study of commercial growing and management of flowers is:", o: ["Floriculture", "Pomology", "Olericulture", "Silviculture"], a: 0 },
                { q: "Which horticultural crop is naturally propagated through 'Runners'?", o: ["Strawberry", "Pineapple", "Banana", "Citrus"], a: 0 },
                { q: "Seedless fruit production without fertilization (Parthenocarpy) is natural in:", o: ["Banana", "Mango", "Pomegranate", "Apple"], a: 0 },
                { q: "Which plant hormone gas is extensively used for the artificial ripening of fruits?", o: ["Oxygen", "Nitrogen", "Ethylene", "Carbon Dioxide"], a: 2 }
            ],
            hi: [
                { q: "हॉर्टिकल्चर (Horticulture) शब्द की उत्पत्ति किस भाषा से हुई है?", o: ["ग्रीक", "लैटिन", "फ्रेंच", "अरबी"], a: 1 },
                { q: "भारत में आधुनिक बागवानी का जनक किसे माना जाता है?", o: ["एम.एस. स्वामीनाथन", "एम.एच. मारीगौड़ा", "एल.एच. बेली", "के.एल. चड्ढा"], a: 1 },
                { q: "निम्नलिखित में से कौन सा एक शीतोष्ण (Temperate) फल है जो एमजेपीआरयू परीक्षाओं में अक्सर पूछा जाता है?", o: ["आम", "सेब", "केला", "अमरूद"], a: 1 },
                { q: "ओलेरीकल्चर (Olericulture) के अंतर्गत किसका वैज्ञानिक अध्ययन किया जाता है?", o: ["फल फसलों का", "सब्जी फसलों का", "फूलों की फसलों का", "मसालों का"], a: 1 },
                { q: "टी-बडिंग (T-Budding) द्वारा अलैंगिक प्रवर्धन किसमें सबसे सामान्य व्यावसायिक विधि है?", o: ["गुलाब", "आम", "पपीता", "केला"], a: 0 },
                { q: "भारत में 'फलों का राजा' किस फल फसल को कहा जाता है?", o: ["सेब", "आम", "अंगूर", "अनानास"], a: 1 },
                { q: "बेहतर व्यावसायिक उत्पादन के लिए किस फसल में कांट-छांट (Pruning) सबसे आवश्यक है?", o: ["अंगूर", "केला", "पपीता", "नारियल"], a: 0 },
                { q: "निम्नलिखित में से कौन सा फल विटामिन-सी का सबसे समृद्ध प्राकृतिक स्रोत है?", o: ["आम", "बारबाडोस चेरी", "सेब", "केला"], a: 1 },
                { q: "अनार का वानस्पतिक रूप से खाने योग्य भाग कौन सा होता है?", o: ["थैलेमस", "एरिल (Aril)", "मेसोकार्प", "एंडोस्पर्म"], a: 1 },
                { q: "बागवानी पौधों की 'ट्रेनिंग' (Training) मुख्य रूप से किस उद्देश्य से की जाती है?", o: ["उपज बढ़ाने के लिए", "उचित मजबूत ढांचा/आकार देने के लिए", "कीटों को मारने के लिए", "रंग सुधारने के लिए"], a: 1 },
                { q: "राष्ट्रीय बागवानी बोर्ड (NHB) का मुख्यालय कहाँ स्थित है?", o: ["नई दिल्ली", "गुरुग्राम", "लखनऊ", "बेंगलुरु"], a: 1 },
                { q: "फूलों के व्यावसायिक उत्पादन और विपणन के अध्ययन को क्या कहा जाता है?", o: ["फ्लोरीकल्चर", "पोमोलॉजी", "ओलेरीकल्चर", "सिल्विकल्चर"], a: 0 },
                { q: "किस फल फसल का प्रवर्धन प्राकृतिक रूप से 'रनर्स' (Runners) के माध्यम से होता है?", o: ["स्ट्रॉबेरी", "अनानास", "केला", "नींबू"], a: 0 },
                { q: "बिना निषेचन के बीज रहित फल उत्पादन (पार्थेनोकार्पी) किस फल में आम बात है?", o: ["केला", "आम", "अनार", "सेब"], a: 0 },
                { q: "फलों को कृत्रिम रूप से पकाने के लिए किस पादप हार्मोन गैस का उपयोग किया जाता है?", o: ["ऑक्सीजन", "नाइट्रोजन", "एथिलीन", "कार्बन डाइऑक्साइड"], a: 2 }
            ]
        };

        // Generation loop to cleanly replicate data to 50 items maintaining strict question number format
        function fillTo50() {
            ['en', 'hi'].forEach(l => {
                const base = [...quizData[l]];
                while(quizData[l].length < 50) {
                    const temp = base[quizData[l].length % base.length];
                    quizData[l].push({...temp});
                }
            });
        }
        fillTo50();

        let currentLang = 'en';
        let currentIdx = 0;
        let answers = new Array(50).fill(null);

        function startQuiz(l) {
            currentLang = l;
            document.getElementById('langScreen').style.display = 'none';
            document.getElementById('quizScreen').style.display = 'block';
            showQ();
        }

        function showQ() {
            const q = quizData[currentLang][currentIdx];
            document.getElementById('questionCount').innerText = currentLang === 'en' ? `Question ${currentIdx + 1} of 50` : `प्रश्न ${currentIdx + 1} / 50`;
            document.getElementById('questionText').innerText = q.q;
            document.getElementById('progressBar').style.width = `${((currentIdx + 1)/50)*100}%`;

            const grid = document.getElementById('optionsGrid');
            grid.innerHTML = '';
            q.o.forEach((txt, i) => {
                const btn = document.createElement('button');
                btn.className = 'option' + (answers[currentIdx] === i ? ' selected' : '');
                btn.innerHTML = `<span>${txt}</span> <i class="fa-regular ${answers[currentIdx] === i ? 'fa-circle-check' : 'fa-circle'}"></i>`;
                btn.onclick = () => { answers[currentIdx] = i; showQ(); };
                grid.appendChild(btn);
            });

            document.getElementById('prevBtn').disabled = currentIdx === 0;
            const nBtn = document.getElementById('nextBtn');
            if(currentIdx === 49) {
                nBtn.innerHTML = currentLang === 'en' ? 'Finish Test <i class="fa-solid fa-flag-checkered"></i>' : 'टेस्ट समाप्त करें <i class="fa-solid fa-flag-checkered"></i>';
                nBtn.style.background = '#2e7d32';
            } else {
                nBtn.innerHTML = currentLang === 'en' ? 'Next <i class="fa-solid fa-arrow-right"></i>' : 'आगे बढ़ें <i class="fa-solid fa-arrow-right"></i>';
                nBtn.style.background = 'var(--primary)';
            }
        }

        function nextQuestion() {
            if(currentIdx < 49) { currentIdx++; showQ(); } else { results(); }
        }

        function prevQuestion() {
            if(currentIdx > 0) { currentIdx--; showQ(); }
        }

        function results() {
            let score = 0;
            quizData[currentLang].forEach((q, i) => { if(answers[i] === q.a) score++; });
            document.getElementById('quizScreen').style.display = 'none';
            document.getElementById('resultScreen').style.display = 'block';
            document.getElementById('scoreDisplay').innerText = score;
            
            const perc = (score/50)*100;
            const h = document.getElementById('resultHeading');
            const m = document.getElementById('messageBox');
            
            if(perc >= 80) {
                h.innerText = currentLang === 'en' ? "👑 MJPRU Horticulture Topper!" : "👑 एमजेपीआरयू हॉर्टिकल्चर टॉपर!";
                m.innerText = currentLang === 'en' ? "Outstanding performance! Your concepts of Pomology and Olericulture match the university topper standards perfectly. Keep it up!" : "असाधारण प्रदर्शन! बागवानी के क्षेत्र में आपकी पकड़ बिल्कुल यूनिवर्सिटी टॉपर लेवल की है। आपकी यह मेहनत एमजेपीआरयू मेन एग्जाम्स में रंग लाएगी!";
            } else if(perc >= 50) {
                h.innerText = currentLang === 'en' ? "✨ Good Academic Score!" : "✨ सराहनीय प्रयास!";
                m.innerText = currentLang === 'en' ? "Nice work! You have a strong grasp on basic propagation methods. Revise plant hormones to unlock the 90%+ bracket." : "बहुत बढ़िया! यूनिवर्सिटी सिलेबस के हिसाब से आपकी तैयारी काफी अच्छी है। बस प्लांट हार्मोन्स और ट्रेनिंग विधियों को एक बार और दोहरा लें!";
            } else {
                h.innerText = currentLang === 'en' ? "📚 Keep Revising!" : "📚 निरंतर अभ्यास करें!";
                m.innerText = currentLang === 'en' ? "Horticulture requires structured revision. Go through Razaagripoint's premium university notes and try again." : "बागवानी सिलेबस पर थोड़ा और ध्यान देने की आवश्यकता है। सेमेस्टर डैशबोर्ड से प्रीमियम नोट्स को दोबारा पढ़ें और फिर से टेस्ट दें!";
            }
        }

        function restartQuiz() {
            currentIdx = 0; answers.fill(null);
            document.getElementById('resultScreen').style.display = 'none';
            document.getElementById('langScreen').style.display = 'block';
        }
    </script>
</body>
</html>
