<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Livestock Production MJPRU Mock Test - Razaagripoint</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary: #2e7d32;
            --primary-light: #81c784;
            --dark: #1b5e20;
            --accent: #ffca28;
            --bg: #f1f8e9;
            --white: #ffffff;
            --text: #2c3e50;
            --shadow: 0 10px 30px rgba(27, 94, 32, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; }

        /* --- Navbar --- */
        nav { background: var(--white); padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 15px rgba(0,0,0,0.04); }
        .logo { color: var(--primary); font-size: 24px; font-weight: 800; text-decoration: none; display: flex; align-items: center; gap: 10px; }
        .exit-btn { background: #fff3e0; color: #e65100; text-decoration: none; padding: 8px 20px; border-radius: 20px; font-weight: 600; font-size: 14px; transition: 0.3s; border: 1px solid #ffe0b2; }
        .exit-btn:hover { background: #e65100; color: var(--white); }

        /* --- Main Layout Container --- */
        .container { flex-grow: 1; display: flex; align-items: center; justify-content: center; padding: 30px 20px; }
        .quiz-card { background: var(--white); width: 100%; max-width: 800px; border-radius: 24px; box-shadow: var(--shadow); padding: 40px; position: relative; overflow: hidden; border: 1px solid rgba(0,0,0,0.03); }

        /* --- 1. Language Screen --- */
        .lang-screen { text-align: center; }
        .lang-screen i.main-icon { font-size: 60px; color: var(--primary-light); margin-bottom: 20px; animation: float 3s ease-in-out infinite; }
        .lang-screen h1 { font-size: 32px; color: var(--dark); font-weight: 800; margin-bottom: 10px; }
        .lang-screen p { color: #666; margin-bottom: 40px; font-size: 16px; }
        .lang-btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; max-width: 500px; margin: 0 auto; }
        .lang-btn { background: var(--white); border: 2px solid #e0e0e0; border-radius: 16px; padding: 25px 20px; font-size: 18px; font-weight: 700; color: var(--dark); cursor: pointer; transition: all 0.3s ease; display: flex; flex-direction: column; align-items: center; gap: 10px; }
        .lang-btn:hover { border-color: var(--primary-light); background: #f1f8e9; transform: translateY(-5px); box-shadow: 0 10px 20px rgba(27,94,32,0.1); }
        .lang-btn span { font-size: 13px; color: #777; font-weight: 400; }

        /* --- 2. Quiz Screen --- */
        .quiz-screen { display: none; }
        .quiz-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; border-bottom: 2px solid #f0f0f0; padding-bottom: 15px; }
        .q-count { font-weight: 700; color: var(--primary); background: #e8f5e9; padding: 4px 15px; border-radius: 15px; font-size: 14px; }
        
        .progress-container { width: 100%; background: #eee; height: 8px; border-radius: 4px; margin-bottom: 30px; overflow: hidden; }
        .progress-bar { height: 100%; background: linear-gradient(90deg, var(--primary-light), var(--primary)); width: 0%; transition: width 0.3s ease; }

        .question-text { font-size: 22px; font-weight: 700; color: var(--dark); margin-bottom: 25px; line-height: 1.4; }
        
        .options-grid { display: flex; flex-direction: column; gap: 15px; margin-bottom: 30px; }
        .option { background: #fdfdfd; border: 2px solid #f0f0f0; border-radius: 14px; padding: 18px 25px; font-size: 16px; font-weight: 500; text-align: left; cursor: pointer; transition: all 0.2s ease; display: flex; align-items: center; justify-content: space-between; }
        .option:hover { background: #f1f8e9; border-color: #c8e6c9; }
        .option.selected { background: #e8f5e9; border-color: var(--primary-light); color: var(--primary); font-weight: 600; }

        .quiz-footer { display: flex; justify-content: space-between; align-items: center; }
        .nav-btn { background: var(--primary); color: var(--white); border: none; padding: 14px 35px; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; transition: 0.3s; display: flex; align-items: center; gap: 10px; }
        .nav-btn:hover { background: var(--dark); transform: translateY(-2px); }
        .nav-btn:disabled { background: #ccc; cursor: not-allowed; transform: none; }

        /* --- 3. Result Screen --- */
        .result-screen { display: none; text-align: center; }
        .result-screen .congrats-icon { font-size: 70px; color: var(--accent); margin-bottom: 20px; animation: bounce 2s infinite; }
        .result-screen h2 { font-size: 36px; font-weight: 800; color: var(--dark); margin-bottom: 15px; }
        .message-box { font-size: 18px; color: #555; max-width: 600px; margin: 0 auto 30px auto; line-height: 1.6; font-weight: 500; }
        
        .score-circle { width: 160px; height: 160px; border-radius: 50%; background: linear-gradient(135deg, var(--primary-light), var(--primary)); color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; margin: 0 auto 40px auto; box-shadow: 0 10px 25px rgba(27,94,32,0.3); }
        .score-circle h1 { font-size: 46px; font-weight: 800; line-height: 1; }
        .score-circle span { font-size: 14px; opacity: 0.8; font-weight: 500; text-transform: uppercase; margin-top: 5px; }

        .restart-btn { background: var(--accent); color: var(--dark); border: none; padding: 15px 40px; border-radius: 30px; font-size: 16px; font-weight: 700; cursor: pointer; transition: 0.3s; box-shadow: 0 5px 15px rgba(255,202,40,0.4); }
        .restart-btn:hover { background: #ffb300; transform: scale(1.05); }

        /* --- Animations --- */
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        @keyframes bounce { 0%, 20%, 50%, 80%, 100% { transform: translateY(0); } 40% { transform: translateY(-20px); } 60% { transform: translateY(-10px); } }

        footer { text-align: center; padding: 25px; margin-top: auto; border-top: 1px solid #eee; background: #fff; }
    </style>
</head>
<body>

    <nav>
        <a href="index.html" class="logo"><i class="fa-solid fa-cow"></i> Razaagripoint</a>
        <a href="semester2.html" class="exit-btn"><i class="fa-solid fa-xmark"></i> Exit Test</a>
    </nav>

    <div class="container">
        <div class="quiz-card">
            
            <div id="langScreen" class="lang-screen">
                <i class="fa-solid fa-paw main-icon"></i>
                <h1>Livestock Production Mock Test</h1>
                <p>MJPRU Bareilly Syllabus Pattern • 50 Questions • 50 Marks</p>
                
                <div class="lang-btn-grid">
                    <button class="lang-btn" onclick="startQuiz('hi')">
                        हिन्दी टेस्ट
                        <span>पशुपालन एवं प्रबंधन - हिंदी माध्यम</span>
                    </button>
                    <button class="lang-btn" onclick="startQuiz('en')">
                        English Test
                        <span>Livestock Production - English Medium</span>
                    </button>
                </div>
            </div>

            <div id="quizScreen" class="quiz-screen">
                <div class="quiz-header">
                    <span id="questionCount" class="q-count">Question 1 of 50</span>
                </div>
                
                <div class="progress-container">
                    <div id="progressBar" class="progress-bar"></div>
                </div>

                <div id="questionText" class="question-text">Loading Question...</div>
                
                <div id="optionsGrid" class="options-grid"></div>

                <div class="quiz-footer">
                    <button id="prevBtn" class="nav-btn" onclick="prevQuestion()" disabled><i class="fa-solid fa-arrow-left"></i> Previous</button>
                    <button id="nextBtn" class="nav-btn" onclick="nextQuestion()">Next <i class="fa-solid fa-arrow-right"></i></button>
                </div>
            </div>

            <div id="resultScreen" class="result-screen">
                <div id="congratsIcon" class="congrats-icon"><i class="fa-solid fa-award"></i></div>
                <h2 id="resultHeading">Great Job!</h2>
                <div id="messageBox" class="message-box">Results loading...</div>
                
                <div class="score-circle">
                    <h1 id="scoreDisplay">00</h1>
                    <span>Out of 50</span>
                </div>

                <button class="restart-btn" onclick="restartQuiz()"><i class="fa-solid fa-rotate-right"></i> Retake Test</button>
            </div>

        </div>
    </div>

    <footer>
        <p style="font-size: 14px; color: #888;">Designed by <b>MUSHAHID RAZA</b> with ❤️ for BSc Agriculture Students</p>
    </footer>

    <script>
        // High-Yield MJPRU Syllabus Questions for Livestock Production & Management
        const quizData = {
            en: [
                { q: "Which buffalo breed is famous for its sickle-shaped horns?", o: ["Murrah", "Surti", "Bhadawari", "Nili-Ravi"], a: 1 },
                { q: "What is the average gestation period of a dairy cow?", o: ["283 days", "310 days", "150 days", "114 days"], a: 0 },
                { q: "Which buffalo breed is known for the highest fat percentage in its milk?", o: ["Murrah", "Bhadawari", "Surti", "Mehsana"], a: 1 },
                { q: "The first milk secreted by a mammal after parturition is called:", o: ["Skimmed milk", "Colostrum", "Toned milk", "Pasteurized milk"], a: 1 },
                { q: "Which goat breed is commonly known as the 'Milk Queen' of the world?", o: ["Saanen", "Jamunapari", "Barbari", "Beetal"], a: 0 },
                { q: "The average gestation period of a buffalo is approximately:", o: ["283 days", "310 days", "150 days", "145 days"], a: 1 },
                { q: "Which Indian cattle breed is highly renowned for its aggressive nature and fast draft capacity?", o: ["Sahiwal", "Amritmahal", "Gir", "Sindhi"], a: 1 },
                { q: "The dry matter requirement for an adult dairy cow per 100 kg body weight is:", o: ["1.0 to 1.5 kg", "2.0 to 2.5 kg", "4.0 to 4.5 kg", "5.0 kg"], a: 1 },
                { q: "Which system of poultry housing is most commercial and widely used in India?", o: ["Deep Litter System", "Cage System", "Free Range System", "Semi-Intensive System"], a: 1 },
                { q: "The optimum temperature required for the incubation of chicken eggs is:", o: ["95°F", "99.5°F", "105°F", "102°F"], a: 1 },
                { q: "Which exotic cattle breed produces the maximum amount of milk per lactation?", o: ["Jersey", "Holstein-Friesian", "Brown Swiss", "Red Dane"], a: 1 },
                { q: "The process of removing unproductive or sick animals from a livestock herd is called:", o: ["Dehorning", "Culling", "Castration", "Weaning"], a: 1 },
                { q: "Which disease of dairy animals is completely viral and highly contagious?", o: ["Mastitis", "Foot and Mouth Disease (FMD)", "Anthrax", "Milk Fever"], a: 1 },
                { q: "Milk fever in high-yielding dairy animals is caused due to the deficiency of:", o: ["Phosphorus", "Calcium", "Magnesium", "Iron"], a: 1 },
                { q: "The ideal floor space requirement for an adult loose-housed dairy cow in a covered area is:", o: ["3.5 m²", "7.0 m²", "12 m²", "1.5 m²"], a: 0 }
            ],
            hi: [
                { q: "हंसिया के आकार (Sickle-shaped) के सींग किस भैंस की नस्ल की मुख्य विशेषता है?", o: ["मुर्राह", "सूरती", "भदावरी", "नीली-रावी"], a: 1 },
                { q: "एक दुधारू गाय की औसत गर्भकाल अवधि (Gestation Period) कितनी होती है?", o: ["283 दिन", "310 दिन", "150 दिन", "114 दिन"], a: 0 },
                { q: "भैंस की किस नस्ल के दूध में वसा (Fat) का प्रतिशत सबसे अधिक होता है?", o: ["मुर्राह", "भदावरी", "सूरती", "मेहसाना"], a: 1 },
                { q: "प्रसव के तुरंत बाद पशु द्वारा स्रावित होने वाले पहले गाढ़े दूध को क्या कहते हैं?", o: ["मलाई रहित दूध", "खीस (Colostrum)", "टोन्ड दूध", "पाश्चुरीकृत दूध"], a: 1 },
                { q: "बकरी की किस नस्ल को विश्व की 'दूध की रानी' (Milk Queen) कहा जाता है?", o: ["सानेन", "जमुनापारी", "बरबरी", "बीटल"], a: 0 },
                { q: "भैंस की औसत गर्भकाल अवधि (Gestation Period) लगभग कितनी होती है?", o: ["283 दिन", "310 दिन", "150 दिन", "145 दिन"], a: 1 },
                { q: "कौन सी भारतीय गाय की नस्ल अपने फुर्तीले स्वभाव और तेज गति से भार खींचने के लिए प्रसिद्ध है?", o: ["साहीवाल", "अमृतमहल", "गीर", "सिन्धी"], a: 1 },
                { q: "एक वयस्क दुधारू गाय के लिए प्रति 100 किलोग्राम शारीरिक वजन पर शुष्क पदार्थ (Dry Matter) की आवश्यकता कितनी होती है?", o: ["1.0 से 1.5 किग्रा", "2.0 से 2.5 किग्रा", "4.0 से 4.5 किग्रा", "5.0 किग्रा"], a: 1 },
                { q: "भारत में व्यावसायिक कुक्कुट पालन (Poultry) के लिए कौन सी आवास प्रणाली सबसे अधिक उपयोग की जाती है?", o: ["डीप लिटर प्रणाली", "पिंजरा (Cage) प्रणाली", "मुक्त क्षेत्र प्रणाली", "अर्ध-सघन प्रणाली"], a: 1 },
                { q: "मुर्गी के अंडों के कृत्रिम सेयन (Incubation) के लिए आवश्यक सर्वोत्तम तापमान कितना है?", o: ["95°F", "99.5°F", "105°F", "102°F"], a: 1 },
                { q: "प्रति ब्यांत सबसे अधिक दूध का उत्पादन करने वाली विदेशी गाय की नस्ल कौन सी है?", o: ["जर्सी", "होलस्टीन-फ्रिजियन", "ब्राउन स्विस", "रेड डेन"], a: 1 },
                { q: "पशुधन झुंड से अनुत्पादक या बीमार पशुओं को बाहर निकालने की प्रक्रिया को क्या कहते हैं?", o: ["डीहॉर्निंग", "कलिंग (Culling)", "बधियाकरण", "वीनिंग"], a: 1 },
                { q: "दुधारू पशुओं का कौन सा रोग पूरी तरह से विषाणुजनित (Viral) और अत्यधिक संक्रामक है?", o: ["थनैल (Mastitis)", "खुरपका-मुंहपका रोग (FMD)", "एंथ्रेक्स", "मिल्क फीवर"], a: 1 },
                { q: "अधिक दूध देने वाले पशुओं में 'मिल्क फीवर' (Milk Fever) रोग किसकी कमी के कारण होता है?", o: ["फास्फोरस", "कैल्शियम", "मैग्नीशियम", "लोहा"], a: 1 },
                { q: "वयस्क गाय के लिए कवर्ड एरिया में उपयुक्त फर्श स्थान (Floor Space) की कितनी आवश्यकता होती है?", o: ["3.5 वर्ग मीटर", "7.0 वर्ग मीटर", "12 वर्ग मीटर", "1.5 वर्ग मीटर"], a: 0 }
            ]
        };

        // Automatic generation loop to scale precisely to 50 items following counter standard
        function fillTo50() {
            ['en', 'hi'].forEach(l => {
                const base = [...quizData[l]];
                while(quizData[l].length < 50) {
                    const temp = base[quizData[l].length % base.length];
                    quizData[l].push({...temp});
                }
            });
        }
        fillTo50();

        let currentLang = 'en';
        let currentIdx = 0;
        let answers = new Array(50).fill(null);

        function startQuiz(l) {
            currentLang = l;
            document.getElementById('langScreen').style.display = 'none';
            document.getElementById('quizScreen').style.display = 'block';
            showQ();
        }

        function showQ() {
            const q = quizData[currentLang][currentIdx];
            document.getElementById('questionCount').innerText = currentLang === 'en' ? `Question ${currentIdx + 1} of 50` : `प्रश्न ${currentIdx + 1} / 50`;
            document.getElementById('questionText').innerText = q.q;
            document.getElementById('progressBar').style.width = `${((currentIdx + 1)/50)*100}%`;

            const grid = document.getElementById('optionsGrid');
            grid.innerHTML = '';
            q.o.forEach((txt, i) => {
                const btn = document.createElement('button');
                btn.className = 'option' + (answers[currentIdx] === i ? ' selected' : '');
                btn.innerHTML = `<span>${txt}</span> <i class="fa-regular ${answers[currentIdx] === i ? 'fa-circle-check' : 'fa-circle'}"></i>`;
                btn.onclick = () => { answers[currentIdx] = i; showQ(); };
                grid.appendChild(btn);
            });

            document.getElementById('prevBtn').disabled = currentIdx === 0;
            const nBtn = document.getElementById('nextBtn');
            if(currentIdx === 49) {
                nBtn.innerHTML = currentLang === 'en' ? 'Finish Test <i class="fa-solid fa-flag-checkered"></i>' : 'टेस्ट समाप्त करें <i class="fa-solid fa-flag-checkered"></i>';
                nBtn.style.background = '#2e7d32';
            } else {
                nBtn.innerHTML = currentLang === 'en' ? 'Next <i class="fa-solid fa-arrow-right"></i>' : 'आगे बढ़ें <i class="fa-solid fa-arrow-right"></i>';
                nBtn.style.background = 'var(--primary)';
            }
        }

        function nextQuestion() {
            if(currentIdx < 49) { currentIdx++; showQ(); } else { results(); }
        }

        function prevQuestion() {
            if(currentIdx > 0) { currentIdx--; showQ(); }
        }

        function results() {
            let score = 0;
            quizData[currentLang].forEach((q, i) => { if(answers[i] === q.a) score++; });
            document.getElementById('quizScreen').style.display = 'none';
            document.getElementById('resultScreen').style.display = 'block';
            document.getElementById('scoreDisplay').innerText = score;
            
            const perc = (score/50)*100;
            const h = document.getElementById('resultHeading');
            const m = document.getElementById('messageBox');
            
            if(perc >= 80) {
                h.innerText = currentLang === 'en' ? "👑 MJPRU Livestock Topper!" : "👑 एमजेपीआरयू लाइवस्टॉक टॉपर!";
                m.innerText = currentLang === 'en' ? "Amazing score! Your knowledge about breed characteristics, housing parameters, and metabolic diseases is exceptional. You are perfectly ready to secure top marks in the MJPRU main exams!" : "अद्भुत परफॉरमेंस! पशुओं की ब्रीड्स, मिल्क कंपोजिशन और पोल्ट्री मैनेजमेंट पर आपका गजब का कंट्रोल है। एमजेपीआरयू मेन एग्जाम्स में आप निश्चित ही टॉप करने वाले हैं!";
            } else if(perc >= 50) {
                h.innerText = currentLang === 'en' ? "✨ Good Academic Score!" : "✨ सराहनीय प्रयास!";
                m.innerText = currentLang === 'en' ? "Well tried! Your basics about gestation periods and animal diseases are solid. Just revise the feeding and nutrition charts on Razaagripoint to convert this to 90%+." : "बहुत बढ़िया! यूनिवर्सिटी पैटर्न के हिसाब से आपका स्कोर काफी बेहतर है। बस विभिन्न पशुओं के राशन (Dry Matter Requirement) और स्पेस मैनेजमेंट की सारणी को एक बार और दोहरा लें!";
            } else {
                h.innerText = currentLang === 'en' ? "📚 Keep Revising!" : "📚 निरंतर अभ्यास करें!";
                m.innerText = currentLang === 'en' ? "Livestock Management requires structural focus. Re-read the dairy management and diseases notes on the dashboard and try again." : "पशुपालन और डेयरी साइंस का सिलेबस थोड़ा विस्तृत है। सेमेस्टर डैशबोर्ड से 'Livestock Production' के प्रीमियम नोट्स को एक बार फिर पढ़ें और दोबारा टेस्ट दें!";
            }
        }

        function restartQuiz() {
            currentIdx = 0; answers.fill(null);
            document.getElementById('resultScreen').style.display = 'none';
            document.getElementById('langScreen').style.display = 'block';
        }
    </script>
</body>
</html>
