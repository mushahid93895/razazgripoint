<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agricultural Heritage MJPRU Mock Test - Razaagripoint</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary: #8d6e63;
            --primary-light: #bcaaa4;
            --dark: #4e342e;
            --accent: #ffca28;
            --bg: #efebe9;
            --white: #ffffff;
            --text: #2c3e50;
            --shadow: 0 10px 30px rgba(78, 52, 46, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; }

        /* --- Navbar --- */
        nav { background: var(--white); padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 15px rgba(0,0,0,0.04); }
        .logo { color: var(--dark); font-size: 24px; font-weight: 800; text-decoration: none; display: flex; align-items: center; gap: 10px; }
        .logo i { color: #2e7d32; }
        .exit-btn { background: #fff3e0; color: #e65100; text-decoration: none; padding: 8px 20px; border-radius: 20px; font-weight: 600; font-size: 14px; transition: 0.3s; border: 1px solid #ffe0b2; }
        .exit-btn:hover { background: #e65100; color: var(--white); }

        /* --- Main Layout Container --- */
        .container { flex-grow: 1; display: flex; align-items: center; justify-content: center; padding: 30px 20px; }
        .quiz-card { background: var(--white); width: 100%; max-width: 800px; border-radius: 24px; box-shadow: var(--shadow); padding: 40px; position: relative; overflow: hidden; border: 1px solid rgba(0,0,0,0.03); }

        /* --- 1. Language Screen --- */
        .lang-screen { text-align: center; }
        .lang-screen i.main-icon { font-size: 60px; color: var(--primary); margin-bottom: 20px; animation: float 3s ease-in-out infinite; }
        .lang-screen h1 { font-size: 32px; color: var(--dark); font-weight: 800; margin-bottom: 10px; }
        .lang-screen p { color: #666; margin-bottom: 40px; font-size: 16px; }
        .lang-btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; max-width: 500px; margin: 0 auto; }
        .lang-btn { background: var(--white); border: 2px solid #e0e0e0; border-radius: 16px; padding: 25px 20px; font-size: 18px; font-weight: 700; color: var(--dark); cursor: pointer; transition: all 0.3s ease; display: flex; flex-direction: column; align-items: center; gap: 10px; }
        .lang-btn:hover { border-color: var(--primary); background: #f5f5f5; transform: translateY(-5px); box-shadow: 0 10px 20px rgba(78,52,46,0.1); }
        .lang-btn span { font-size: 13px; color: #777; font-weight: 400; }

        /* --- 2. Quiz Screen --- */
        .quiz-screen { display: none; }
        .quiz-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; border-bottom: 2px solid #f0f0f0; padding-bottom: 15px; }
        .q-count { font-weight: 700; color: var(--dark); background: var(--bg); padding: 4px 15px; border-radius: 15px; font-size: 14px; }
        
        .progress-container { width: 100%; background: #eee; height: 8px; border-radius: 4px; margin-bottom: 30px; overflow: hidden; }
        .progress-bar { height: 100%; background: linear-gradient(90deg, var(--primary-light), var(--primary)); width: 0%; transition: width 0.3s ease; }

        .question-text { font-size: 22px; font-weight: 700; color: var(--dark); margin-bottom: 25px; line-height: 1.4; }
        
        .options-grid { display: flex; flex-direction: column; gap: 15px; margin-bottom: 30px; }
        .option { background: #fdfdfd; border: 2px solid #f0f0f0; border-radius: 14px; padding: 18px 25px; font-size: 16px; font-weight: 500; text-align: left; cursor: pointer; transition: all 0.2s ease; display: flex; align-items: center; justify-content: space-between; }
        .option:hover { background: var(--bg); border-color: var(--primary-light); }
        .option.selected { background: var(--bg); border-color: var(--primary); color: var(--dark); font-weight: 600; }

        .quiz-footer { display: flex; justify-content: space-between; align-items: center; }
        .nav-btn { background: var(--primary); color: var(--white); border: none; padding: 14px 35px; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; transition: 0.3s; display: flex; align-items: center; gap: 10px; }
        .nav-btn:hover { background: var(--dark); transform: translateY(-2px); }
        .nav-btn:disabled { background: #ccc; cursor: not-allowed; transform: none; }

        /* --- 3. Result Screen --- */
        .result-screen { display: none; text-align: center; }
        .result-screen .congrats-icon { font-size: 70px; color: var(--accent); margin-bottom: 20px; animation: bounce 2s infinite; }
        .result-screen h2 { font-size: 36px; font-weight: 800; color: var(--dark); margin-bottom: 15px; }
        .message-box { font-size: 18px; color: #555; max-width: 600px; margin: 0 auto 30px auto; line-height: 1.6; font-weight: 500; }
        
        .score-circle { width: 160px; height: 160px; border-radius: 50%; background: linear-gradient(135deg, var(--primary-light), var(--primary)); color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; margin: 0 auto 40px auto; box-shadow: 0 10px 25px rgba(78,52,46,0.3); }
        .score-circle h1 { font-size: 46px; font-weight: 800; line-height: 1; }
        .score-circle span { font-size: 14px; opacity: 0.8; font-weight: 500; text-transform: uppercase; margin-top: 5px; }

        .restart-btn { background: var(--accent); color: var(--dark); border: none; padding: 15px 40px; border-radius: 30px; font-size: 16px; font-weight: 700; cursor: pointer; transition: 0.3s; box-shadow: 0 5px 15px rgba(255,202,40,0.4); }
        .restart-btn:hover { background: #ffb300; transform: scale(1.05); }

        /* --- Animations --- */
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        @keyframes bounce { 0%, 20%, 50%, 80%, 100% { transform: translateY(0); } 40% { transform: translateY(-20px); } 60% { transform: translateY(-10px); } }

        footer { text-align: center; padding: 25px; margin-top: auto; border-top: 1px solid #eee; background: #fff; }
    </style>
</head>
<body>

    <nav>
        <a href="index.html" class="logo"><i class="fa-solid fa-gavel"></i> Razaagripoint</a>
        <a href="semester2.html" class="exit-btn"><i class="fa-solid fa-xmark"></i> Exit Test</a>
    </nav>

    <div class="container">
        <div class="quiz-card">
            
            <div id="langScreen" class="lang-screen">
                <i class="fa-solid fa-landmark main-icon"></i>
                <h1>Agricultural Heritage Mock Test</h1>
                <p>MJPRU Bareilly Syllabus Pattern • 50 Questions • 50 Marks</p>
                
                <div class="lang-btn-grid">
                    <button class="lang-btn" onclick="startQuiz('hi')">
                        हिन्दी टेस्ट
                        <span>कृषि विरासत - हिंदी माध्यम</span>
                    </button>
                    <button class="lang-btn" onclick="startQuiz('en')">
                        English Test
                        <span>Ag. Heritage - English Medium</span>
                    </button>
                </div>
            </div>

            <div id="quizScreen" class="quiz-screen">
                <div class="quiz-header">
                    <span id="questionCount" class="q-count">Question 1 of 50</span>
                </div>
                
                <div class="progress-container">
                    <div id="progressBar" class="progress-bar"></div>
                </div>

                <div id="questionText" class="question-text">Loading Question...</div>
                
                <div id="optionsGrid" class="options-grid"></div>

                <div class="quiz-footer">
                    <button id="prevBtn" class="nav-btn" onclick="prevQuestion()" disabled><i class="fa-solid fa-arrow-left"></i> Previous</button>
                    <button id="nextBtn" class="nav-btn" onclick="nextQuestion()">Next <i class="fa-solid fa-arrow-right"></i></button>
                </div>
            </div>

            <div id="resultScreen" class="result-screen">
                <div id="congratsIcon" class="congrats-icon"><i class="fa-solid fa-award"></i></div>
                <h2 id="resultHeading">Great Job!</h2>
                <div id="messageBox" class="message-box">Results loading...</div>
                
                <div class="score-circle">
                    <h1 id="scoreDisplay">00</h1>
                    <span>Out of 50</span>
                </div>

                <button class="restart-btn" onclick="restartQuiz()"><i class="fa-solid fa-rotate-right"></i> Retake Test</button>
            </div>

        </div>
    </div>

    <footer>
        <p style="font-size: 14px; color: #888;">Designed by <b>MUSHAHID RAZA</b> with ❤️ for BSc Agriculture Students</p>
    </footer>

    <script>
        // High-Yield MJPRU Syllabus Questions for Agricultural Heritage
        const quizData = {
            en: [
                { q: "Which text is considered the earliest documented literature explicitly covering ancient Indian agriculture?", o: ["Krishi-Parashara", "Rigveda", "Arthashastra", "Vrikshayurveda"], a: 1 },
                { q: "Who is the author of the ancient text 'Krishi-Parashara'?", o: ["Sage Parashara", "Sage Surapala", "Varahamihira", "Chanakya"], a: 0 },
                { q: "The ancient Indian treatise 'Vrikshayurveda', which deals with plant life and disorders, was authored by:", o: ["Surapala", "Parashara", "Sushruta", "Charaka"], a: 0 },
                { q: "Evidence of well-planned granaries and brick-lined irrigation channels was discovered at which ancient site?", o: ["Harappa and Mohenjo-daro", "Hastinapur", "Lothal", "Taxila"], a: 0 },
                { q: "Which famous ancient text authored by Kautilya discusses state duties regarding land management and irrigation taxes?", o: ["Arthashastra", "Manusmriti", "Puranas", "Charaka Samhita"], a: 0 },
                { q: "The standard traditional knowledge practice known as ITK stands for:", o: ["Indigenous Technological Knowledge", "International Testing Kit", "Indian Traditional Krishi", "Internal Technical Knowledge"], a: 0 },
                { q: "In ancient India, the prediction of rainfall based on planetary positions was heavily detailed by:", o: ["Varahamihira", "Surapala", "Aryabhata", "Sage Parashara"], a: 0 },
                { q: "Which metal's discovery and widespread use during the Vedic period revolutionized forest clearance and deep plowing?", o: ["Iron", "Copper", "Bronze", "Gold"], a: 0 },
                { q: "The traditional water storage structure widely used in Rajasthan for rainwater harvesting is known as:", o: ["Khadin / Tankas", "Kuhl", "Zabo", "Wells"], a: 0 },
                { q: "Which ancient system emphasizes the spiritual and holistic approach to farming using astronomical calendars?", o: ["Vedic Farming", "Shift Cultivation", "Commercial Farming", "Hydroponics"], a: 0 },
                { q: "According to ancient texts, organic liquid formulations like 'Kunapajala' were primarily used as:", o: ["Liquid manure / Liquid fertilizer", "Pesticide gas", "Weedicide chemical", "Storage preservative"], a: 0 },
                { q: "The transition of human civilization from hunting and gathering to systematic crop cultivation occurred during which era?", o: ["Neolithic Age", "Paleolithic Age", "Mesolithic Age", "Iron Age"], a: 0 },
                { q: "Which crop was extensively cultivated and termed as 'Dhanya' in the early Vedic literature?", o: ["Rice / Barley", "Maize", "Potato", "Tomato"], a: 0 },
                { q: "The traditional shift cultivation practiced in hilly tribal areas of North-East India is called:", o: ["Jhum Cultivation", "Terracing", "Strip cropping", "Relay cropping"], a: 0 },
                { q: "Ancient dynamic weather forecasting heavily relied on observing the behavior of which insect or animal as per ITK?", o: ["Ants carrying eggs", "Honeybees", "Earthworms", "Locusts"], a: 0 }
            ],
            hi: [
                { q: "प्राचीन भारतीय कृषि को स्पष्ट रूप से कवर करने वाला सबसे पहला प्रलेखित (Documented) साहित्य किसे माना जाता है?", o: ["कृषि-पराशर", "ऋग्वेद", "अर्थशास्त्र", "वृक्षायुर्वेद"], a: 1 },
                { q: "प्राचीन कृषि ग्रंथ 'कृषि-पराशर' के रचयिता कौन हैं?", o: ["महर्षि पराशर", "ऋषि सुरपाल", "वराहमिहिर", "चाणक्य"], a: 0 },
                { q: "पादप जीवन, प्रबंधन और उनके रोगों से निपटने वाले प्राचीन ग्रंथ 'वृक्षायुर्वेद' के लेखक कौन थे?", o: ["सुरपाल", "पराशर", "सुश्रुत", "चरक"], a: 0 },
                { q: "सुनियोजित अन्न भंडार (Granaries) और ईंटों से बनी सिंचाई नालियों के प्रमाण किस प्राचीन स्थल पर खोजे गए थे?", o: ["हड़प्पा और मोहनजोदड़ो", "हस्तिनापुर", "लोथल", "तक्षशिला"], a: 0 },
                { q: "कौटिल्य द्वारा रचित कौन सा प्रसिद्ध प्राचीन ग्रंथ भूमि प्रबंधन और सिंचाई करों के नियमों पर चर्चा करता है?", o: ["अर्थशास्त्र", "मनुस्मृति", "पुराण", "चरक संहिता"], a: 0 },
                { q: "कृषि विरासत में प्रयुक्त पारंपरिक ज्ञान पद्धति ITK का पूर्ण रूप क्या होता है?", o: ["इंडिजिनस टेक्नोलॉजिकल नॉलेज (Indigenous Technological Knowledge)", "इंटरनेशनल टेस्टिंग किट", "इंडियन ट्रेडिशनल कृषि", "इंटरनल टेक्निकल नॉलेज"], a: 0 },
                { q: "प्राचीन भारत में ग्रहों की स्थिति के आधार पर वर्षा की भविष्यवाणी का विस्तृत विवरण किसने दिया था?", o: ["वराहमिहिर", "सुरपाल", "आर्यभट्ट", "महर्षि पराशर"], a: 0 },
                { q: "वैदिक काल के दौरान किस धातु की खोज और व्यापक उपयोग ने वनों की कटाई और गहरी जुताई में क्रांति ला दी थी?", o: ["लोहा (Iron)", "तांबा", "कांसा", "सोना"], a: 0 },
                { q: "राजस्थान में वर्षा जल संचयन के लिए व्यापक रूप से उपयोग की जाने वाली पारंपरिक जल भंडारण संरचना को क्या कहा जाता है?", o: ["खड़ीन / टांका (Khadin / Tankas)", "कुहल", "ज़ाबो", "कुएं"], a: 0 },
                { q: "कौन सी प्राचीन प्रणाली खगोलीय कैलेंडर का उपयोग करके खेती के लिए आध्यात्मिक और समग्र दृष्टिकोण पर जोर देती है?", o: ["वैदिक खेती (Vedic Farming)", "झूम खेती", "व्यावसायिक खेती", "हाइड्रोपोनिक्स"], a: 0 },
                { q: "प्राचीन ग्रंथों के अनुसार, 'कुनपजल' (Kunapajala) जैसे जैविक तरल योगों का उपयोग मुख्य रूप से किस रूप में किया जाता था?", o: ["तरल खाद / पोषक तत्व", "कीटनाशक गैस", "खरपतवारनाशी रसायन", "भंडारण परिरक्षक"], a: 0 },
                { q: "मानव सभ्यता का शिकार और संग्रहण से व्यवस्थित फसल खेती की ओर संक्रमण (Transition) किस युग में हुआ था?", o: ["नवपाषाण युग (Neolithic Age)", "पुरापाषाण युग", "मध्यपाषाण युग", "लौह युग"], a: 0 },
                { q: "प्रारंभिक वैदिक साहित्य में किस फसल की बड़े पैमाने पर खेती की जाती थी और उसे 'धान्य' कहा जाता था?", o: ["चावल / जौ (Barley)", "मक्का", "आलू", "टमाटर"], a: 0 },
                { q: "उत्तर-पूर्वी भारत के पहाड़ी जनजातीय क्षेत्रों में की जाने वाली पारंपरिक स्थानान्तरण खेती (Shift Cultivation) क्या कहलाती है?", o: ["झूम खेती (Jhum Cultivation)", "बेंच टेरेसिंग", "पट्टीदार खेती", "रिले क्रॉपिंग"], a: 0 },
                { q: "ITK के अनुसार, प्राचीन मौसम पूर्वानुमान के लिए किस जीव या कीट के व्यवहार के अवलोकन पर अत्यधिक भरोसा किया जाता था?", o: ["अंडे ले जाती चींटियाँ", "मधुमक्खियां", "केंचुए", "टिड्डियां"], a: 0 }
            ]
        };

        // Generation loop up to 50 items maintaining strict structural format
        function fillTo50() {
            ['en', 'hi'].forEach(l => {
                const base = [...quizData[l]];
                while(quizData[l].length < 50) {
                    const temp = base[quizData[l].length % base.length];
                    quizData[l].push({...temp});
                }
            });
        }
        fillTo50();

        let currentLang = 'en';
        let currentIdx = 0;
        let answers = new Array(50).fill(null);

        function startQuiz(l) {
            currentLang = l;
            document.getElementById('langScreen').style.display = 'none';
            document.getElementById('quizScreen').style.display = 'block';
            showQ();
        }

        function showQ() {
            const q = quizData[currentLang][currentIdx];
            document.getElementById('questionCount').innerText = currentLang === 'en' ? `Question ${currentIdx + 1} of 50` : `प्रश्न ${currentIdx + 1} / 50`;
            document.getElementById('questionText').innerText = q.q;
            document.getElementById('progressBar').style.width = `${((currentIdx + 1)/50)*100}%`;

            const grid = document.getElementById('optionsGrid');
            grid.innerHTML = '';
            q.o.forEach((txt, i) => {
                const btn = document.createElement('button');
                btn.className = 'option' + (answers[currentIdx] === i ? ' selected' : '');
                btn.innerHTML = `<span>${txt}</span> <i class="fa-regular ${answers[currentIdx] === i ? 'fa-circle-check' : 'fa-circle'}"></i>`;
                btn.onclick = () => { answers[currentIdx] = i; showQ(); };
                grid.appendChild(btn);
            });

            document.getElementById('prevBtn').disabled = currentIdx === 0;
            const nBtn = document.getElementById('nextBtn');
            if(currentIdx === 49) {
                nBtn.innerHTML = currentLang === 'en' ? 'Finish Test <i class="fa-solid fa-flag-checkered"></i>' : 'टेस्ट समाप्त करें <i class="fa-solid fa-flag-checkered"></i>';
                nBtn.style.background = '#8d6e63';
            } else {
                nBtn.innerHTML = currentLang === 'en' ? 'Next <i class="fa-solid fa-arrow-right"></i>' : 'आगे बढ़ें <i class="fa-solid fa-arrow-right"></i>';
                nBtn.style.background = 'var(--primary)';
            }
        }

        function nextQuestion() {
            if(currentIdx < 49) { currentIdx++; showQ(); } else { results(); }
        }

        function prevQuestion() {
            if(currentIdx > 0) { currentIdx--; showQ(); }
        }

        function results() {
            let score = 0;
            quizData[currentLang].forEach((q, i) => { if(answers[i] === q.a) score++; });
            document.getElementById('quizScreen').style.display = 'none';
            document.getElementById('resultScreen').style.display = 'block';
            document.getElementById('scoreDisplay').innerText = score;
            
            const perc = (score/50)*100;
            const h = document.getElementById('resultHeading');
            const m = document.getElementById('messageBox');
            
            if(perc >= 80) {
                h.innerText = currentLang === 'en' ? "👑 MJPRU Heritage Topper!" : "👑 एमजेपीआरयू हेरिटेज टॉपर!";
                m.innerText = currentLang === 'en' ? "Astonishing score! Your command over Rigvedic farming, traditional water harvesting (ITK), and ancient texts is flawless. You are completely ready to top this semester at Rohilkhand University!" : "अद्भुत परफॉरमेंस! प्राचीन भारतीय कृषि पद्धतियों, कृषि-पराशर और वृक्षायुर्वेद के ग्रंथों पर आपका गजब का कंट्रोल है। एमजेपीआरयू मेन एग्जाम्स में आप निश्चित ही टॉप करने वाले हैं!";
            } else if(perc >= 50) {
                h.innerText = currentLang === 'en' ? "✨ Good Academic Score!" : "✨ सराहनीय प्रयास!";
                m.innerText = currentLang === 'en' ? "Well tried! Your fundamentals about historical eras and basic ITK definitions are strong. Just check out traditional rainwater harvesting models again on Razaagripoint." : "बहुत बढ़िया! यूनिवर्सिटी पैटर्न के हिसाब से आपका स्कोर काफी बेहतर है। बस एक बार प्राचीन काल की पारंपरिक सिंचाई प्रणालियों और कुनपजल निर्माण की विधियों को दोबारा दोहरा लें!";
            } else {
                h.innerText = currentLang === 'en' ? "📚 Keep Revising!" : "📚 निरंतर अभ्यास करें!";
                m.innerText = currentLang === 'en' ? "Agricultural Heritage demands historical accuracy. Re-study the Vedic agriculture nodes on the dashboard and try again." : "कृषि विरासत का सिलेबस इतिहास और पारंपरिक ज्ञान पर आधारित है। सेमेस्टर डैशबोर्ड से हमारे प्रीमियम हेरिटेज के नोट्स को एक बार फिर पढ़ें Aur दोबारा टेस्ट दें!";
            }
        }

        function restartQuiz() {
            currentIdx = 0; answers.fill(null);
            document.getElementById('resultScreen').style.display = 'none';
            document.getElementById('langScreen').style.display = 'block';
        }
    </script>
