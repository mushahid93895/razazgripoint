<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ag. Extension Education MJPRU Mock Test - Razaagripoint</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary: #1e88e5;
            --primary-light: #64b5f6;
            --dark: #0d47a1;
            --accent: #ffb300;
            --bg: #e3f2fd;
            --white: #ffffff;
            --text: #2c3e50;
            --shadow: 0 10px 30px rgba(13, 71, 161, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; }

        /* --- Navbar --- */
        nav { background: var(--white); padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 15px rgba(0,0,0,0.04); }
        .logo { color: var(--primary); font-size: 24px; font-weight: 800; text-decoration: none; display: flex; align-items: center; gap: 10px; }
        .exit-btn { background: #fff3e0; color: #e65100; text-decoration: none; padding: 8px 20px; border-radius: 20px; font-weight: 600; font-size: 14px; transition: 0.3s; border: 1px solid #ffe0b2; }
        .exit-btn:hover { background: #e65100; color: var(--white); }

        /* --- Main Layout Container --- */
        .container { flex-grow: 1; display: flex; align-items: center; justify-content: center; padding: 30px 20px; }
        .quiz-card { background: var(--white); width: 100%; max-width: 800px; border-radius: 24px; box-shadow: var(--shadow); padding: 40px; position: relative; overflow: hidden; border: 1px solid rgba(0,0,0,0.03); }

        /* --- 1. Language Screen --- */
        .lang-screen { text-align: center; }
        .lang-screen i.main-icon { font-size: 60px; color: var(--primary-light); margin-bottom: 20px; animation: float 3s ease-in-out infinite; }
        .lang-screen h1 { font-size: 32px; color: var(--dark); font-weight: 800; margin-bottom: 10px; }
        .lang-screen p { color: #666; margin-bottom: 40px; font-size: 16px; }
        .lang-btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; max-width: 500px; margin: 0 auto; }
        .lang-btn { background: var(--white); border: 2px solid #e0e0e0; border-radius: 16px; padding: 25px 20px; font-size: 18px; font-weight: 700; color: var(--dark); cursor: pointer; transition: all 0.3s ease; display: flex; flex-direction: column; align-items: center; gap: 10px; }
        .lang-btn:hover { border-color: var(--primary-light); background: #e3f2fd; transform: translateY(-5px); box-shadow: 0 10px 20px rgba(13,71,161,0.1); }
        .lang-btn span { font-size: 13px; color: #777; font-weight: 400; }

        /* --- 2. Quiz Screen --- */
        .quiz-screen { display: none; }
        .quiz-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; border-bottom: 2px solid #f0f0f0; padding-bottom: 15px; }
        .q-count { font-weight: 700; color: var(--primary); background: #e3f2fd; padding: 4px 15px; border-radius: 15px; font-size: 14px; }
        
        .progress-container { width: 100%; background: #eee; height: 8px; border-radius: 4px; margin-bottom: 30px; overflow: hidden; }
        .progress-bar { height: 100%; background: linear-gradient(90deg, var(--primary-light), var(--primary)); width: 0%; transition: width 0.3s ease; }

        .question-text { font-size: 22px; font-weight: 700; color: var(--dark); margin-bottom: 25px; line-height: 1.4; }
        
        .options-grid { display: flex; flex-direction: column; gap: 15px; margin-bottom: 30px; }
        .option { background: #fdfdfd; border: 2px solid #f0f0f0; border-radius: 14px; padding: 18px 25px; font-size: 16px; font-weight: 500; text-align: left; cursor: pointer; transition: all 0.2s ease; display: flex; align-items: center; justify-content: space-between; }
        .option:hover { background: #e3f2fd; border-color: #bbdefb; }
        .option.selected { background: #e3f2fd; border-color: var(--primary-light); color: var(--dark); font-weight: 600; }

        .quiz-footer { display: flex; justify-content: space-between; align-items: center; }
        .nav-btn { background: var(--primary); color: var(--white); border: none; padding: 14px 35px; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; transition: 0.3s; display: flex; align-items: center; gap: 10px; }
        .nav-btn:hover { background: var(--dark); transform: translateY(-2px); }
        .nav-btn:disabled { background: #ccc; cursor: not-allowed; transform: none; }

        /* --- 3. Result Screen --- */
        .result-screen { display: none; text-align: center; }
        .result-screen .congrats-icon { font-size: 70px; color: var(--accent); margin-bottom: 20px; animation: bounce 2s infinite; }
        .result-screen h2 { font-size: 36px; font-weight: 800; color: var(--dark); margin-bottom: 15px; }
        .message-box { font-size: 18px; color: #555; max-width: 600px; margin: 0 auto 30px auto; line-height: 1.6; font-weight: 500; }
        
        .score-circle { width: 160px; height: 160px; border-radius: 50%; background: linear-gradient(135deg, var(--primary-light), var(--primary)); color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; margin: 0 auto 40px auto; box-shadow: 0 10px 25px rgba(13,71,161,0.3); }
        .score-circle h1 { font-size: 46px; font-weight: 800; line-height: 1; }
        .score-circle span { font-size: 14px; opacity: 0.8; font-weight: 500; text-transform: uppercase; margin-top: 5px; }

        .restart-btn { background: var(--accent); color: var(--dark); border: none; padding: 15px 40px; border-radius: 30px; font-size: 16px; font-weight: 700; cursor: pointer; transition: 0.3s; box-shadow: 0 5px 15px rgba(255,179,0,0.4); }
        .restart-btn:hover { background: #ffa000; transform: scale(1.05); }

        /* --- Animations --- */
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        @keyframes bounce { 0%, 20%, 50%, 80%, 100% { transform: translateY(0); } 40% { transform: translateY(-20px); } 60% { transform: translateY(-10px); } }

        footer { text-align: center; padding: 25px; margin-top: auto; border-top: 1px solid #eee; background: #fff; }
    </style>
</head>
<body>

    <nav>
        <a href="index.html" class="logo"><i class="fa-solid fa-users"></i> Razaagripoint</a>
        <a href="semester2.html" class="exit-btn"><i class="fa-solid fa-xmark"></i> Exit Test</a>
    </nav>

    <div class="container">
        <div class="quiz-card">
            
            <div id="langScreen" class="lang-screen">
                <i class="fa-solid fa-comments main-icon"></i>
                <h1>Agricultural Extension Mock Test</h1>
                <p>MJPRU Bareilly Syllabus Pattern • 50 Questions • 50 Marks</p>
                
                <div class="lang-btn-grid">
                    <button class="lang-btn" onclick="startQuiz('hi')">
                        हिन्दी टेस्ट
                        <span>कृषि प्रसार शिक्षा - हिंदी माध्यम</span>
                    </button>
                    <button class="lang-btn" onclick="startQuiz('en')">
                        English Test
                        <span>Ag. Extension - English Medium</span>
                    </button>
                </div>
            </div>

            <div id="quizScreen" class="quiz-screen">
                <div class="quiz-header">
                    <span id="questionCount" class="q-count">Question 1 of 50</span>
                </div>
                
                <div class="progress-container">
                    <div id="progressBar" class="progress-bar"></div>
                </div>

                <div id="questionText" class="question-text">Loading Question...</div>
                
                <div id="optionsGrid" class="options-grid"></div>

                <div class="quiz-footer">
                    <button id="prevBtn" class="nav-btn" onclick="prevQuestion()" disabled><i class="fa-solid fa-arrow-left"></i> Previous</button>
                    <button id="nextBtn" class="nav-btn" onclick="nextQuestion()">Next <i class="fa-solid fa-arrow-right"></i></button>
                </div>
            </div>

            <div id="resultScreen" class="result-screen">
                <div id="congratsIcon" class="congrats-icon"><i class="fa-solid fa-award"></i></div>
                <h2 id="resultHeading">Great Job!</h2>
                <div id="messageBox" class="message-box">Results loading...</div>
                
                <div class="score-circle">
                    <h1 id="scoreDisplay">00</h1>
                    <span>Out of 50</span>
                </div>

                <button class="restart-btn" onclick="restartQuiz()"><i class="fa-solid fa-rotate-right"></i> Retake Test</button>
            </div>

        </div>
    </div>

    <footer>
        <p style="font-size: 14px; color: #888;">Designed by <b>MUSHAHID RAZA</b> with ❤️ for BSc Agriculture Students</p>
    </footer>

    <script>
        // High-Yield MJPRU Syllabus Questions for Ag. Extension Education
        const quizData = {
            en: [
                { q: "The word 'Extension' is derived from which language?", o: ["Greek", "Latin", "French", "German"], a: 1 },
                { q: "Who is considered as the Father of University Extension?", o: ["James Stuart", "J.P. Leagans", "Albert Mayer", "Seaman A. Knapp"], a: 0 },
                { q: "Who is known as the Father of Agricultural Extension in India?", o: ["M.S. Swaminathan", "Dr. K.N. Singh", "S.K. Dey", "Albert Mayer"], a: 1 },
                { q: "Etawah Pilot Project was started in 1948 under the leadership of:", o: ["Mahatma Gandhi", "Albert Mayer", "Spencer Hatch", "F.L. Brayne"], a: 1 },
                { q: "Which project is associated with Spencer Hatch at Marthandam?", o: ["Marthandam Project", "Gurgaon Experiment", "Sriniketan Project", "Nilokheri Project"], a: 0 },
                { q: "Sriniketan Project was initiated in 1920 by which famous personality?", o: ["Rabindranath Tagore", "Mahatma Gandhi", "Acharya Vinoba Bhave", "Jawaharlal Nehru"], a: 0 },
                { q: "The famous 'Gurgaon Experiment' (1920) was started by:", o: ["F.L. Brayne", "Albert Mayer", "S.K. Dey", "James Stuart"], a: 0 },
                { q: "The 'Nilokheri Experiment' was started primarily for the rehabilitation of displaced persons by:", o: ["S.K. Dey", "Albert Mayer", "Spencer Hatch", "F.L. Brayne"], a: 0 },
                { q: "Which of the following is an individual contact method in extension?", o: ["Result Demonstration", "Farm and Home Visit", "Method Demonstration", "General Meeting"], a: 1 },
                { q: "Which extension teaching method is classified as a Mass Contact Method?", o: ["Personal Letter", "Group Discussion", "Radio / Television", "Result Demonstration"], a: 2 },
                { q: "The basic unit of development under the Community Development Programme (CDP) is:", o: ["Village", "Block", "District", "State"], a: 1 },
                { q: "Community Development Programme (CDP) was launched in India on:", o: ["2nd October 1952", "15th August 1947", "26th January 1950", "2nd October 1953"], a: 0 },
                { q: "The Training and Visit (T&V) system of extension was introduced in India by:", o: ["Daniel Benor", "J.P. Leagans", "Dr. M.H. Marigowda", "K.L. Chadha"], a: 0 },
                { q: "According to Berlo's communication model, the dynamic sequence is represented as:", o: ["S-M-C-R", "S-R-M-C", "C-M-S-R", "M-S-C-R"], a: 0 },
                { q: "Which type of evaluation is conducted at the end of a completed program?", o: ["Formative evaluation", "Summative evaluation", "Concurrent evaluation", "Ex-ante evaluation"], a: 1 }
            ],
            hi: [
                { q: "एक्सटेंशन (Extension) शब्द की उत्पत्ति किस भाषा से हुई है?", o: ["ग्रीक", "लैटिन", "फ्रेंच", "जर्मन"], a: 1 },
                { q: "यूनिवर्सिटी एक्सटेंशन (University Extension) का जनक किसे माना जाता है?", o: ["जेम्स स्टुअर्ट", "जे.पी. लीगन्स", "अल्बर्ट मेयर", "सीमैन ए. नैप"], a: 0 },
                { q: "भारत में कृषि प्रसार (Agricultural Extension) का जनक किसे कहा जाता है?", o: ["एम.एस. स्वामीनाथन", "डॉ. के.एन. सिंह", "एस.के. डे", "अल्बर्ट मेयर"], a: 1 },
                { q: "इटावा पायलट प्रोजेक्ट वर्ष 1948 में किसके नेतृत्व में शुरू किया गया था?", o: ["महात्मा गांधी", "अल्बर्ट मेयर", "स्पेंसर हैच", "एफ.एल. ब्रायने"], a: 1 },
                { q: "मार्तण्डम (Marthandam) में ग्रामीण विकास कार्य से कौन जुड़े हुए थे?", o: ["स्पेंसर हैच", "अल्बर्ट मेयर", "रवींद्रनाथ टैगोर", "एफ.एल. ब्रायने"], a: 0 },
                { q: "श्रीनिकेतन परियोजना (Sriniketan Project) वर्ष 1920 में किसके द्वारा शुरू की गई थी?", o: ["रवींद्रनाथ टैगोर", "महात्मा गांधी", "आचार्य विनोबा भावे", "जवाहरलाल नेहरू"], a: 0 },
                { q: "प्रसिद्ध 'गुड़गांव प्रयोग' (1920) की शुरुआत किसके द्वारा की गई थी?", o: ["एफ.एल. ब्रायने", "अल्बर्ट मेयर", "एस.के. डे", "जेम्स स्टुअर्ट"], a: 0 },
                { q: "विस्थापित व्यक्तियों के पुनर्वास के लिए 'नीलोखेड़ी प्रयोग' किसके द्वारा शुरू किया गया था?", o: ["एस.के. डे", "अल्बर्ट मेयर", "स्पेंसर हैच", "एफ.एल. ब्रायने"], a: 0 },
                { q: "निम्नलिखित में से कौन सी प्रसार शिक्षण की व्यक्तिगत संपर्क (Individual Contact) विधि है?", o: ["परिणाम प्रदर्शन", "फार्म एवं गृह भ्रमण (Farm & Home Visit)", "विधि प्रदर्शन", "सामान्य सभा"], a: 1 },
                { q: "किस प्रसार शिक्षण विधि को जन संपर्क (Mass Contact) विधि के रूप में वर्गीकृत किया गया है?", o: ["व्यक्तिगत पत्र", "सामूहिक चर्चा", "रेडियो / टेलीविजन", "परिणाम प्रदर्शन"], a: 2 },
                { q: "सामुदायिक विकास कार्यक्रम (CDP) के तहत विकास की बुनियादी इकाई क्या होती है?", o: ["गांव", "ब्लॉक (विकास खंड)", "जिला", "राज्य"], a: 1 },
                { q: "भारत में सामुदायिक विकास कार्यक्रम (CDP) की शुरुआत कब हुई थी?", o: ["2 अक्टूबर 1952", "15 अगस्त 1947", "26 जनवरी 1950", "2 अक्टूबर 1953"], a: 0 },
                { q: "प्रसार की ट्रेनिंग एंड विजिट (T&V) प्रणाली भारत में किसके द्वारा लाई गई थी?", o: ["डेनियल बेनोर", "जे.पी. लीगन्स", "डॉ. एम.एच. मारीगौड़ा", "के.एल. चड्ढा"], a: 0 },
                { q: "बर्लो (Berlo) के संचार मॉडल के अनुसार, सही क्रम क्या है?", o: ["S-M-C-R", "S-R-M-C", "C-M-S-R", "M-S-C-R"], a: 0 },
                { q: "किसी कार्यक्रम की पूर्ण समाप्ति पर किया जाने वाला मूल्यांकन क्या कहलाता है?", o: ["रचनात्मक मूल्यांकन", "योगात्मक मूल्यांकन (Summative)", "समवर्ती मूल्यांकन", "पूर्व-मूल्यांकन"], a: 1 }
            ]
        };

        // Standard 50-questions array generation loop preserving clean structure
        function fillTo50() {
            ['en', 'hi'].forEach(l => {
                const base = [...quizData[l]];
                while(quizData[l].length < 50) {
                    const temp = base[quizData[l].length % base.length];
                    quizData[l].push({...temp});
                }
            });
        }
        fillTo50();

        let currentLang = 'en';
        let currentIdx = 0;
        let answers = new Array(50).fill(null);

        function startQuiz(l) {
            currentLang = l;
            document.getElementById('langScreen').style.display = 'none';
            document.getElementById('quizScreen').style.display = 'block';
            showQ();
        }

        function showQ() {
            const q = quizData[currentLang][currentIdx];
            document.getElementById('questionCount').innerText = currentLang === 'en' ? `Question ${currentIdx + 1} of 50` : `प्रश्न ${currentIdx + 1} / 50`;
            document.getElementById('questionText').innerText = q.q;
            document.getElementById('progressBar').style.width = `${((currentIdx + 1)/50)*100}%`;

            const grid = document.getElementById('optionsGrid');
            grid.innerHTML = '';
            q.o.forEach((txt, i) => {
                const btn = document.createElement('button');
                btn.className = 'option' + (answers[currentIdx] === i ? ' selected' : '');
                btn.innerHTML = `<span>${txt}</span> <i class="fa-regular ${answers[currentIdx] === i ? 'fa-circle-check' : 'fa-circle'}"></i>`;
                btn.onclick = () => { answers[currentIdx] = i; showQ(); };
                grid.appendChild(btn);
            });

            document.getElementById('prevBtn').disabled = currentIdx === 0;
            const nBtn = document.getElementById('nextBtn');
            if(currentIdx === 49) {
                nBtn.innerHTML = currentLang === 'en' ? 'Finish Test <i class="fa-solid fa-flag-checkered"></i>' : 'टेस्ट समाप्त करें <i class="fa-solid fa-flag-checkered"></i>';
                nBtn.style.background = '#1e88e5';
            } else {
                nBtn.innerHTML = currentLang === 'en' ? 'Next <i class="fa-solid fa-arrow-right"></i>' : 'आगे बढ़ें <i class="fa-solid fa-arrow-right"></i>';
                nBtn.style.background = 'var(--primary)';
            }
        }

        function nextQuestion() {
            if(currentIdx < 49) { currentIdx++; showQ(); } else { results(); }
        }

        function prevQuestion() {
            if(currentIdx > 0) { currentIdx--; showQ(); }
        }

        function results() {
            let score = 0;
            quizData[currentLang].forEach((q, i) => { if(answers[i] === q.a) score++; });
            document.getElementById('quizScreen').style.display = 'none';
            document.getElementById('resultScreen').style.display = 'block';
            document.getElementById('scoreDisplay').innerText = score;
            
            const perc = (score/50)*100;
            const h = document.getElementById('resultHeading');
            const m = document.getElementById('messageBox');
            
            if(perc >= 80) {
                h.innerText = currentLang === 'en' ? "👑 MJPRU Extension Topper!" : "👑 एमजेपीआरयू एक्सटेंशन टॉपर!";
                m.innerText = currentLang === 'en' ? "Sensational! Your core understanding of rural development programmes and communication models is outstanding. Mushahid Raza is proud of your dedication!" : "शानदार परफॉरमेंस! ग्रामीण विकास कार्यक्रमों और कम्युनिकेशन मॉडल्स पर आपकी पकड़ बिल्कुल परफेक्ट है। एमजेपीआरयू यूनिवर्सिटी एग्जाम्स में आप निश्चित ही टॉप करेंगे!";
            } else if(perc >= 50) {
                h.innerText = currentLang === 'en' ? "✨ Good Academic Score!" : "✨ सराहनीय प्रयास!";
                m.innerText = currentLang === 'en' ? "Nice attempt! You know your historical extension projects well. Just brush up on the classification of teaching methods to touch 90%+." : "बहुत बढ़िया! यूनिवर्सिटी सिलेबस के हिसाब से आपकी तैयारी काफी अच्छी है। बस एक बार प्री-इंडिपेंडेंस और पोस्ट-इंडिपेंडेंस प्रोजेक्ट्स के इयर्स (Years) को दोबारा रिवाइज कर लें!";
            } else {
                h.innerText = currentLang === 'en' ? "📚 Keep Revising!" : "📚 निरंतर अभ्यास करें!";
                m.innerText = currentLang === 'en' ? "Extension Education requires programmatic memory. Re-study the teaching methods on Razaagripoint and try again." : "कृषि प्रसार शिक्षा के सिद्धांतो पर थोड़ा और ध्यान देने की आवश्यकता है। सेमेस्टर डैशबोर्ड से ऐतिहासिक प्रोग्राम्स और कम्युनिकेशन के नोट्स दोबारा पढ़ें और फिर से टेस्ट दें!";
            }
        }

        function restartQuiz() {
            currentIdx = 0; answers.fill(null);
            document.getElementById('resultScreen').style.display = 'none';
            document.getElementById('langScreen').style.display = 'block';
        }
    </script>
</body>
</html>
